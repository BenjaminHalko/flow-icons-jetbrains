# Plugin coordinates
# pluginVersion is kept in sync with the bundled Flow Icons VSIX version by
# tools/update-icons.cjs; release tags use this same value.
pluginGroup=dev.flowicons
pluginName=Flow Icons
pluginVersion=2.0.5

# Plugin id, must be globally unique
pluginId=dev.flowicons.jetbrains

# Target IntelliJ Platform.
# IC = IntelliJ IDEA Community; the plugin only depends on com.intellij.modules.platform,
# so the resulting build runs on every JetBrains IDE (PyCharm, WebStorm, GoLand, Rider, ...).
platformType=IC
platformVersion=2024.2.5

# Broad compatibility window. 242 == 2024.2; leave the upper bound open for forward compat.
pluginSinceBuild=242
pluginUntilBuild=

# Gradle
kotlin.stdlib.default.dependency=false
org.gradle.configuration-cache=false
org.gradle.caching=true
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
