name: Release

on:
  push:
    tags:
      - "*"
  workflow_call:
    inputs:
      version:
        description: "Plugin version"
        required: true
        type: string
      ref:
        description: "Commit SHA"
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve version & tag
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building Flow Icons $VERSION (tag $TAG)"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build plugin
        run: |
          chmod +x ./gradlew
          ./gradlew buildPlugin --no-daemon -PpluginVersion=${{ steps.ver.outputs.version }}

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          target_commitish: ${{ inputs.ref }}
          name: Flow Icons ${{ steps.ver.outputs.version }}
          body: |
            Flow Icons ${{ steps.ver.outputs.version }}.

            Install: **Settings → Plugins → ⚙ → Install Plugin from Disk…** and pick the attached zip.
          files: build/distributions/*.zip
          fail_on_unmatched_files: true
